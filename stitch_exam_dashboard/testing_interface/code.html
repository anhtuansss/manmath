<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ManMath - Exam Interface</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#f5fff6",
                        "on-secondary-fixed-variant": "#2f2ebe",
                        "secondary-container": "#6063ee",
                        "on-primary-container": "#fefcff",
                        "secondary": "#4648d4",
                        "tertiary-fixed": "#6ffbbe",
                        "on-secondary-fixed": "#07006c",
                        "inverse-surface": "#283044",
                        "surface-dim": "#d2d9f4",
                        "surface-container-low": "#f2f3ff",
                        "on-tertiary": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "tertiary": "#006947",
                        "surface-tint": "#005ac2",
                        "primary-container": "#2170e4",
                        "on-secondary-container": "#fffbff",
                        "surface-variant": "#dae2fd",
                        "background": "#faf8ff",
                        "on-surface": "#131b2e",
                        "outline": "#727785",
                        "inverse-on-surface": "#eef0ff",
                        "on-primary-fixed": "#001a42",
                        "on-error": "#ffffff",
                        "outline-variant": "#c2c6d6",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#c0c1ff",
                        "primary": "#0058be",
                        "primary-fixed-dim": "#adc6ff",
                        "on-tertiary-fixed-variant": "#005236",
                        "surface": "#faf8ff",
                        "on-primary-fixed-variant": "#004395",
                        "on-background": "#131b2e",
                        "on-tertiary-fixed": "#002113",
                        "surface-bright": "#faf8ff",
                        "inverse-primary": "#adc6ff",
                        "primary-fixed": "#d8e2ff",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#dae2fd",
                        "error": "#ba1a1a",
                        "secondary-fixed": "#e1e0ff",
                        "surface-container-high": "#e2e7ff",
                        "tertiary-container": "#00855b",
                        "tertiary-fixed-dim": "#4edea3",
                        "surface-container": "#eaedff",
                        "on-surface-variant": "#424754"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "md": "16px",
                        "margin-mobile": "16px",
                        "lg": "24px",
                        "xs": "4px",
                        "xl": "32px",
                        "sm": "8px",
                        "gutter": "24px",
                        "max-width-exam": "800px",
                        "unit": "4px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "display": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "display": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-lg": ["28px", { "lineHeight": "36px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-background min-h-screen flex flex-col antialiased">
<!-- TopNavBar -->
<nav class="bg-surface dark:bg-on-background docked full-width top-0 sticky z-50 border-b border-outline-variant dark:border-outline flat no shadows">
<div class="flex justify-between items-center w-full px-lg py-sm max-w-exam mx-auto">
<div class="font-display text-display text-primary dark:text-primary-fixed-dim">
                ManMath
            </div>
<div class="flex-1 flex justify-center items-center gap-md hidden md:flex">
<span class="text-on-surface-variant dark:text-surface-variant hover:text-primary dark:hover:text-primary-fixed transition-colors font-label-md text-label-md cursor-pointer">Dashboard</span>
<span class="text-primary dark:text-primary-fixed-dim border-b-2 border-primary pb-1 font-label-md text-label-md cursor-pointer">Exams</span>
<span class="text-on-surface-variant dark:text-surface-variant hover:text-primary dark:hover:text-primary-fixed transition-colors font-label-md text-label-md cursor-pointer">Profile</span>
</div>
<div class="flex items-center gap-md">
<div class="flex items-center gap-sm text-on-surface-variant">
<div class="w-2 h-2 rounded-full bg-tertiary"></div>
<span class="font-label-sm text-label-sm">Autosaved</span>
</div>
<div class="flex items-center gap-xs text-primary font-headline-md text-headline-md">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">timer</span>
                    01:25:30
                </div>
<button class="bg-primary text-on-primary font-label-md text-label-md px-lg py-sm rounded hover:opacity-80 transition-opacity">
                    Submit
                </button>
</div>
</div>
</nav>
<!-- Main Layout -->
<div class="flex flex-1 overflow-hidden">
<!-- Center Content (Canvas) -->
<main class="flex-1 overflow-y-auto p-lg flex justify-center">
<div class="w-full max-w-max-width-exam flex flex-col gap-xl mt-xl">
<div class="flex items-baseline justify-between border-b border-outline-variant pb-sm">
<h1 class="font-headline-lg text-headline-lg text-on-surface">Đề thi thử số 05</h1>
<span class="font-label-md text-label-md text-on-surface-variant">Question 15 of 50</span>
</div>
<!-- Question Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-xl flex flex-col gap-lg">
<div class="flex gap-sm items-start">
<span class="font-headline-md text-headline-md text-primary shrink-0">15.</span>
<div class="font-body-lg text-body-lg text-on-surface">
<p>Calculate the definite integral of the function \( f(x) = 3x^2 - 2x + 1 \) from \( x = 1 \) to \( x = 3 \).</p>
</div>
</div>
<!-- Answer Options -->
<div class="flex flex-col gap-sm mt-md">
<!-- Option A -->
<label class="flex items-center gap-md p-lg border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors group">
<input class="w-5 h-5 text-primary border-outline-variant focus:ring-primary" name="q15" type="radio" value="A"/>
<span class="font-headline-md text-headline-md text-on-surface-variant group-hover:text-primary w-6 text-center">A</span>
<span class="font-body-md text-body-md text-on-surface flex-1">20</span>
</label>
<!-- Option B (Selected) -->
<label class="flex items-center gap-md p-lg border-2 border-primary bg-primary-fixed rounded-lg cursor-pointer transition-colors relative">
<input checked="" class="w-5 h-5 text-primary border-primary focus:ring-primary" name="q15" type="radio" value="B"/>
<span class="font-headline-md text-headline-md text-primary w-6 text-center">B</span>
<span class="font-body-md text-body-md text-on-surface flex-1">22</span>
<span class="material-symbols-outlined text-primary absolute right-lg" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</label>
<!-- Option C -->
<label class="flex items-center gap-md p-lg border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors group">
<input class="w-5 h-5 text-primary border-outline-variant focus:ring-primary" name="q15" type="radio" value="C"/>
<span class="font-headline-md text-headline-md text-on-surface-variant group-hover:text-primary w-6 text-center">C</span>
<span class="font-body-md text-body-md text-on-surface flex-1">24</span>
</label>
<!-- Option D -->
<label class="flex items-center gap-md p-lg border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors group">
<input class="w-5 h-5 text-primary border-outline-variant focus:ring-primary" name="q15" type="radio" value="D"/>
<span class="font-headline-md text-headline-md text-on-surface-variant group-hover:text-primary w-6 text-center">D</span>
<span class="font-body-md text-body-md text-on-surface flex-1">26</span>
</label>
</div>
</div>
<div class="flex justify-between mt-md">
<button class="flex items-center gap-xs px-md py-sm border border-outline-variant rounded text-on-surface-variant hover:bg-surface-container-low font-label-md text-label-md transition-colors">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
                        Previous
                    </button>
<button class="flex items-center gap-xs px-md py-sm bg-surface-container-low text-primary border border-primary-container rounded hover:bg-surface-container-high font-label-md text-label-md transition-colors">
                        Next
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</div>
</main>
<!-- SideNavBar -->
<aside class="bg-surface-container-low dark:bg-surface-container h-screen w-64 overflow-y-auto border-l border-outline-variant border-r border-outline-variant dark:border-outline flat no shadows hidden lg:flex flex-col p-md gap-sm shrink-0">
<div class="mb-md">
<h2 class="font-headline-md text-headline-md text-on-surface">Question Navigator</h2>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-xs">50 Total Questions</p>
</div>
<button class="w-full py-sm px-md mb-md border border-outline-variant rounded-lg text-on-surface-variant font-label-md text-label-md flex items-center justify-center gap-xs hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[16px]">flag</span>
                Flag for Review
            </button>
<div class="grid grid-cols-5 gap-xs">
<!-- Completed (1-14) -->
<script>
                    for(let i=1; i<=14; i++) {
                        let extraClass = i === 5 ? 'relative' : '';
                        let flagHtml = i === 5 ? '<span class="material-symbols-outlined absolute -top-1 -right-1 text-error text-[12px]" style="font-variation-settings: \'FILL\' 1;">warning</span>' : '';
                        document.write(`
                            <button class="w-10 h-10 bg-primary-fixed text-primary border border-primary-container rounded flex items-center justify-center font-label-sm text-label-sm hover:bg-primary-fixed-dim transition-colors ${extraClass}">
                                ${i}
                                ${flagHtml}
                            </button>
                        `);
                    }
                </script>
<!-- Active (15) -->
<button class="w-10 h-10 bg-primary text-on-primary rounded-xl font-bold border-2 border-primary-container flex items-center justify-center font-label-sm text-label-sm scale-90 duration-200 shadow-sm relative">
                    15
                </button>
<!-- Empty (16-50) -->
<script>
                    for(let i=16; i<=50; i++) {
                        document.write(`
                            <button class="w-10 h-10 border border-outline text-on-surface-variant rounded flex items-center justify-center font-label-sm text-label-sm hover:bg-surface-container-high transition-all">
                                ${i}
                            </button>
                        `);
                    }
                </script>
</div>
</aside>
</div>
</body></html>
